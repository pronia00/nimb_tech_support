<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nimb Tech Support</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Техподдержка Nimb</h1>
        <form id="support-form">
            <label>
                Название спота
                <input type="text" name="spot" required>
            </label>
            <label>
                ФИО
                <input type="text" name="fullName" required>
            </label>
            <label>
                Telegram ID
                <input type="text" name="telegramId" required>
            </label>
            <label>
                Логин от системы
                <input type="text" name="login" required>
            </label>
            <label>
                Пароль от системы
                <input type="password" name="password" required>
            </label>
            <label>
                Описание проблемы
                <textarea name="description" rows="4" required></textarea>
            </label>
            <label>
                Фото/скриншоты
                <input type="file" name="attachments" multiple accept="image/*">
            </label>
            <button type="submit" id="submit-btn">Отправить обращение</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
